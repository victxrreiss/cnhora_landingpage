name: Telegram Commit Notify - Landing Page

on:
  push:
    branches:
      - dev
      - main

jobs:
  notify:
    name: Notificar equipe no Telegram
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Teste simples de notificação
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "BOT_TOKEN existe? ${BOT_TOKEN:+SIM}"
          echo "CHAT_ID existe?   ${CHAT_ID:+SIM}"
          
          if [[ -n "$BOT_TOKEN" && -n "$CHAT_ID" ]]; then
            echo "✅ As duas secrets estão configuradas corretamente."
            curl -s -X POST "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              -d "{\"chat_id\": \"${CHAT_ID}\", \"text\": \"Teste simples do GitHub Actions - Landing Page\", \"parse_mode\": \"HTML\"}"
            echo "Mensagem de teste enviada."
          else
            echo "❌ Alguma secret está faltando."
          fi
