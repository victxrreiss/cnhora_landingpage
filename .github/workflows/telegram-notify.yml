name: Telegram Commit Notify - Landing Page

on:
  push:
    branches:
      - dev
      - main

jobs:
  notify:
    name: Notificar equipe no Telegram
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Teste Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== DEBUG TELEGRAM LANDING PAGE ==="
          echo "Token length : ${#BOT_TOKEN}"
          echo "Chat ID      : $CHAT_ID"
          echo "==================================="

          sudo apt-get update -qq && sudo apt-get install -y jq

          # Monta o JSON
          JSON=$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "Teste do repositório Landing Page" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')

          echo "Enviando mensagem para o Telegram..."

          # Forma MAIS SEGURA de chamar a API
          curl -v -s -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON" || echo "Curl falhou com código: $?"

          echo "Script finalizado."
