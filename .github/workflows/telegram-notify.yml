name: Telegram Commit Notify - Landing Page

on:
  push:
    branches:
      - dev
      - main

jobs:
  notify:
    name: Notificar equipe no Telegram
    runs-on: ubuntu-latest
    continue-on-error: true

    steps:
      - name: Teste mínimo de envio para Telegram
        env:
          BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "=== DEBUG TELEGRAM WORKFLOW ==="
          echo "BOT_TOKEN length: ${#BOT_TOKEN} caracteres"
          echo "CHAT_ID: $CHAT_ID"
          echo "=============================="

          echo "Instalando jq..."
          sudo apt-get update -qq && sudo apt-get install -y jq

          echo "jq instalado. Versão: $(jq --version)"

          echo "Montando JSON..."
          JSON=$(jq -n \
            --arg chat_id "$CHAT_ID" \
            --arg text "Teste do GitHub Actions - Landing Page" \
            '{chat_id: $chat_id, text: $text, parse_mode: "HTML", disable_web_page_preview: true}')

          echo "JSON montado com sucesso."
          echo "Enviando requisição para Telegram..."

          RESPONSE=$(curl -v -s -w "\nHTTP_CODE:%{http_code}" -X POST \
            "https://api.telegram.org/bot${BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "$JSON" 2>&1)

          echo "=== RESPOSTA DO CURL ==="
          echo "$RESPONSE"

          HTTP_CODE=$(echo "$RESPONSE" | grep -o 'HTTP_CODE:[0-9]*' | cut -d: -f2)
          BODY=$(echo "$RESPONSE" | sed 's/HTTP_CODE:[0-9]*//')

          echo "HTTP Status: $HTTP_CODE"
          echo "Body: $BODY"

          if [[ "$HTTP_CODE" == "200" ]]; then
            echo "✅ Sucesso! Mensagem enviada."
          else
            echo "❌ Falha no envio"
            exit 1
          fi
